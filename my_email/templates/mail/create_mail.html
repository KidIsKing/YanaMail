{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block content %}
  <h1>
    Создание письма
  </h1>
  <div class="col d-flex justify-content-center">
    <div class="card" style="width: 40rem;">
      <div class="card-header">
        Создание письма
      </div>

      <div class="card-body">
        <form method="post">  
          {% csrf_token %}
          {% bootstrap_form form %}
          {% bootstrap_button button_type="submit" content="Создать" %}
        </form>
      </div>
    </div>
  </div>
{% endblock %}
